[project]
name   = "Entity Core Protocol"
slug   = "entity-core-protocol"
repo   = "entity-core-protocol"
github = "https://github.com/EntityChurch/entity-core-protocol"
intro  = """
The irreducible protocol every Entity peer must speak — the mandatory
convergence layer (Layers 0-4): the ECF wire format, the native type system, the
identity / capability / dispatch core, and the core tree operations (put/get). Two peers
that agree on this interoperate at the substrate; everything above it (extensions, SDK,
applications) is optional and lives in entity-system-architecture. The core profile
(`--profile core`) is independently re-derived by 15 generated peers at 0-FAIL plus the
Go / Rust / Python reference implementations.
"""

